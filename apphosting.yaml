# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

env:
  - variable: NODE_ENV
    value: production
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyC5Kryaewq6NcXjpF-ciABQ4Z7RSdm2GwA
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: kadry-online-4h3x9.firebaseapp.com
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: kadry-online-4h3x9
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: kadry-online-4h3x9.appspot.com
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: 358071580509
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:358071580509:web:c6deaffc2548f8fdde5ab4"
  - variable: NEXT_PUBLIC_FIREBASE_DATABASE_URL
    value: https://kadry-online-4h3x9-default-rtdb.europe-west1.firebasedatabase.app
  # For resend, this isn't strictly public but since it's used on the backend we can attempt to pass it here, 
  # though best practice for secrets is Firebase App Hosting Secret Manager. We will add them here for convenience if they are not real secrets.
  # Actually, Resend API key is a secret, we'll leave it out, but if it fails on the server, user needs to set it via secrets.

runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  cpu: 1
  memoryMiB: 512

scheduledJobs:
- schedule: "0 23 * * *"
  timeZone: "Europe/Warsaw"
  httpTarget:
    uri: "/api/cron/daily-checks"
